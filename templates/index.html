<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorisation IA — pix2pix GAN</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="card">
    <h1>Colorisation IA</h1>
    <p class="subtitle">pix2pix GAN — glisse une image N&amp;B pour la coloriser</p>

    <div id="dropzone" class="dropzone">
      <span id="dropzone-label">Glisse une image ici ou clique pour choisir</span>
      <input type="file" id="file-input" accept=".jpg,.jpeg,.png" hidden />
    </div>

    <button id="btn-colorize" disabled>Coloriser</button>

    <div id="spinner" class="spinner hidden"></div>
    <p id="error-msg" class="error hidden"></p>

    <div id="result" class="result hidden">
      <div class="img-wrapper">
        <p>Original (N&amp;B)</p>
        <img id="img-original" alt="original" />
      </div>
      <div class="img-wrapper">
        <p>Colorisé</p>
        <img id="img-colorized" alt="colorisé" />
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
